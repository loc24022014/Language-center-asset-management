# =============================================
# Application Info
# =============================================
spring.application.name=asset-management
server.port=8080

# =============================================
# SQL Server DataSource
# =============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=LangCenterAssetDB;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=YourPassword123!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# JWT Configuration
# =============================================
app.jwt.secret=LangCenterSecretKey2024SuperLongSecretKeyForHS256Algorithm!
app.jwt.expiration-ms=86400000

# =============================================
# Swagger / OpenAPI
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =============================================
# Logging
# =============================================
logging.level.com.langcenter=DEBUG
logging.level.org.springframework.security=INFO

# =============================================
# Email Configuration (Dummy config for testing)
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
